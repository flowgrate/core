name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
          - os: windows
            arch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o flowgrate-${{ matrix.os }}-${{ matrix.arch }}${EXT} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: flowgrate-${{ matrix.os }}-${{ matrix.arch }}*
